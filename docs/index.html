<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="style.css">
    <title>Document</title>
</head>
<body>
     <div class="container-fluid">
        <div class="row">
            <div class="col-md bg-light p-4 text-center ">
                <header>
                    <h1>Cadastro</h1>
                </header>
            </div>
        </div>
    <main>
        <div class="row">
                <form action="">
                    <div class="mb-3">
                        <label for="name" class="form-label">Nome: </label>
                        <input type="text" name="nome" class="form-control">
                    </div>
                    <div class="mb-3">
                        <label for="number" class="form-label">Número de Telefone: </label>
                        <input type="text" name="numero" class="form-control">
                    </div>
                    <div class="mb-3">
                    <label for="e-mail" class="form-label">E-mail: </label>
                    <input type="email" class="form-control">
                    </div>
                    <div class="mb-3">
                    <label for="" class="form-label">Cidade/Estado: </label>
                    <input type="text" class="form-control">
                    </div>
                    <div class="mb-3">
                    <label for="" class="form-label">Data de Nascimento: </label>
                    <input type="date" class="form-control">
                    </div>
                    <div class="mb-3">
                    <div class="form-check">
                    <label for="" class="form-check-label">Feminino</label>
                    <input type="radio" name="sexo" class="form-check-input">
                    </div>
                    <div class="form-check">
                    <label for="" >Masculino</label>
                    <input type="radio" name="sexo" class="form-check-input">
                    </div>
                    <div class="form-check">
                    <label for="" class="form-check-label">Prefiro não informar</label>
                    <input type="radio" name="sexo" class="form-check-input">
                    </div>
                    </div>

                    <button type="submit" class="btn btn-primary w-100">Cadastrar</button>
                </form>
            </div>
        </div>
    </main>
</body>
</html>
